global
    daemon
    maxconn 4096
    log stdout local0 info

defaults
    mode tcp
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option tcplog
    log global

# Frontend para MQTT (patrón sidecar)
frontend mqtt_frontend
    bind *:1883
    default_backend mqtt_backend

# Backend que apunta al servicio Mosquitto principal
backend mqtt_backend
    balance roundrobin
    option tcp-check
    server mosquitto mosquitto:1883 check

# Stats para monitoreo (opcional)
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats admin if TRUE
    