#version: '3.8'

services:
  # NGINX Load Balancer (Ambassador Pattern)
  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "81:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend-1
      - backend-2
      - backend-3
    networks:
      - app-network
    restart: always

  # PostgreSQL con alta disponibilidad
  postgres-master:
    image: postgres:15
    container_name: postgres-master
    environment:
      POSTGRES_DB: adn_alert_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_password
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./postgres/master/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/master/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - app-network

  postgres-replica:
    image: postgres:15
    container_name: postgres-replica
    environment:
      POSTGRES_DB: adn_alert_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_password
      PGUSER: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      - postgres-master
    networks:
      - app-network

  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - app-network

  # HAProxy como sidecar para Mosquitto (patrón sidecar)
  mosquitto-sidecar:
    image: haproxy:alpine
    container_name: mosquitto-sidecar
    ports:
      - "1884:1883"  # Puerto alternativo para acceso balanceado
    volumes:
      - ./haproxy/mosquitto-haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - mosquitto
    networks:
      - app-network

  # Backend instances para balanceo de carga
  backend-1:
    build:
      context: ./adn-alert-backend
    container_name: backend-1
    depends_on:
      - mosquitto
      - postgres-master
    environment:
      - DATABASE_URL=postgresql://postgres:tu_password@postgres-master:5432/adn_alert_db
      - MQTT_BROKER_URL=mosquitto
      - INSTANCE_ID=backend-1
    ports:
      - "8001:8000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - app-network

  backend-2:
    build:
      context: ./adn-alert-backend
    container_name: backend-2
    depends_on:
      - mosquitto
      - postgres-master
    environment:
      - DATABASE_URL=postgresql://postgres:tu_password@postgres-master:5432/adn_alert_db
      - MQTT_BROKER_URL=mosquitto
      - INSTANCE_ID=backend-2
    ports:
      - "8002:8000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - app-network

  backend-3:
    build:
      context: ./adn-alert-backend
    container_name: backend-3
    depends_on:
      - mosquitto
      - postgres-master
    environment:
      - DATABASE_URL=postgresql://postgres:tu_password@postgres-master:5432/adn_alert_db
      - MQTT_BROKER_URL=mosquitto
      - INSTANCE_ID=backend-3
    ports:
      - "8003:8000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - app-network

  # Frontend
  frontend:
    build:
      context: ./adn-alert-frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_WEBSOCKET_URL=ws://nginx-lb:8080/ws
      - REACT_APP_API_URL=http://nginx-lb:80/api
    stdin_open: true
    tty: true
    #depends_on:
    #  - nginx-lb
    networks:
      - app-network

  # Redis para cache y sesiones (mejora la alta disponibilidad)
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # Monitoring con Prometheus (opcional pero recomendado)
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

volumes:
  postgres_master_data:
  postgres_replica_data:
  redis_data:

networks:
  app-network:
    driver: bridge